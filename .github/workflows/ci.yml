name: MLOps Pipeline

on:
  push:
    branches: [ main ]

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # ── Step 1: Checkout code ────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v3

      # ── Step 2: Set up Python ────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # ── Step 3: Install dependencies ─────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Step 4: Configure AWS credentials for DVC + S3 ───────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      # ── Step 5: Pull data from S3 using DVC ──────────────────────────
      - name: DVC pull
        run: dvc pull

      # ── Step 6: Train model + MLflow logging ─────────────────────────
      - name: Train model
        run: python train.py

      # ── Step 7: Upload MLflow runs as GitHub Artifact ─────────────────
      - name: Upload MLflow logs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns/
          retention-days: 30

      # ── Step 8: Upload metrics.json as GitHub Artifact ────────────────
      - name: Upload metrics JSON as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: metrics.json
          retention-days: 30

      # ── Step 9: Login to Docker Hub ───────────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # ── Step 10: Build Docker image ───────────────────────────────────
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/2022bcs0002-mlops-assignment-mlops:latest .

      # ── Step 11: Push Docker image to Docker Hub ──────────────────────
      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/2022bcs0002-mlops-assignment-mlops:latest