name: MLOps Pipeline

on:
  push:
    branches: [ main ]

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # ── Step 1: Checkout code ────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v3

      # ── Step 2: Set up Python ────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # ── Step 3: Install dependencies ─────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mlflow dvc[s3]

      # ── Step 4: Configure AWS credentials ────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      # ── Step 5: DVC Pull (get dataset) ───────────────────────────────
      - name: DVC Pull
        run: |
          dvc pull

      # ── Step 6: Train model + MLflow logging (IMPORTANT FIX) ─────────
      - name: Train model
        run: |
          export MLFLOW_TRACKING_URI=file:./mlruns
          python train.py

      # ── Step 7: Verify mlruns structure (DEBUG STEP) ─────────────────
      - name: Check mlruns structure
        run: |
          ls -R mlruns

      # ── Step 8: Upload MLflow runs (FULL EXPERIMENT DATA) ────────────
      - name: Upload MLflow runs
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns/
          retention-days: 30

      # ── Step 9: Upload metrics.json ──────────────────────────────────
      - name: Upload metrics JSON
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: metrics.json
          retention-days: 30

      # ── Step 10: Login to Docker Hub ─────────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # ── Step 11: Build Docker image ──────────────────────────────────
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/2022bcs0002-mlops-assignment-mlops:latest .

      # ── Step 12: Push Docker image ───────────────────────────────────
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/2022bcs0002-mlops-assignment-mlops:latest