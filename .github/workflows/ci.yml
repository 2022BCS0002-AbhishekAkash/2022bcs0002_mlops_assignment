name: MLOps Pipeline

on:
  push:
    branches: [ main ]

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # ── Step 1: Checkout code ────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v3

      # ── Step 2: Set up Python ────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # ── Step 3: Install dependencies ─────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Step 4: Configure AWS credentials ────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      # ── Step 5: Pull data from S3 using DVC ──────────────────────────
      - name: DVC pull
        run: dvc pull

      # ── Step 6: Start MLflow server ──────────────────────────────────
      # sqlite = backend (stores runs, params, metrics)
      # s3     = artifact store (stores model files)
      - name: Start MLflow tracking server
        run: |
          mlflow server \
            --backend-store-uri sqlite:///mlflow.db \
            --default-artifact-root s3://${{ secrets.AWS_S3_BUCKET }}/mlflow/artifacts \
            --host 0.0.0.0 \
            --port 5000 &

          echo "Waiting for MLflow server to start..."
          sleep 15

          curl --retry 5 --retry-delay 3 --retry-connrefused http://localhost:5000/health
          echo "MLflow server is up!"

      # ── Step 7: Run training script ───────────────────────────────────
      - name: Train model
        env:
          MLFLOW_TRACKING_URI: http://localhost:5000
        run: python train.py    # ← change this per push

      # ── Step 8: Collect MLflow data ───────────────────────────────────
      - name: Collect MLflow data for artifact upload
        run: |
          mkdir -p mlflow_export/artifacts
          mkdir -p mlflow_export/tracking

          cp mlflow.db mlflow_export/tracking/mlflow.db

          aws s3 sync s3://${{ secrets.AWS_S3_BUCKET }}/mlflow/artifacts \
              mlflow_export/artifacts/

          echo "MLflow export contents:"
          ls -la mlflow_export/

      # ── Step 9: Upload MLflow as GitHub Artifact ──────────────────────
      - name: Upload MLflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlflow_export/
          retention-days: 30

      # ── Step 10: Upload metrics.json ──────────────────────────────────
      - name: Upload metrics JSON
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: metrics.json
          retention-days: 30

      # ── Step 11: Login to Docker Hub ──────────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # ── Step 12: Build and push Docker image ──────────────────────────
      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/2022bcs0002-mlops:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/2022bcs0002-mlops:latest